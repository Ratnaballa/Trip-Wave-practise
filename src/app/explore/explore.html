<div class="explore-container" *ngIf="destination">
  <h1 class="explore-title">{{destination.name}}</h1>
  <img [src]="destination.image" class="explore-image">
  <div class="info-box">
    <p class="rating">⭐ Rating: {{destination.rating}}</p>
    <p class="explore-description">
      {{destination.description}}
    </p>
  </div>
  <div class="info-box">
    <h2 class="section-title">Popular Places</h2>
    <ul class="explore-list">
      <li>Temple</li>
      <li>Beach</li>
      <li>Famous Market</li>
    </ul>
  </div>
  <div class="info-box">
    <h2 class="section-title">Hotels</h2>
    <ul class="explore-list">
      <li>Hotel Paradise</li>
      <li>Ocean View Resort</li>
    </ul>
  </div>
  <button class="book-btn">Book Now</button>
</div>
<div class="info-box">
  <h2 class="section-title">Location Map</h2>
  <iframe
  width="100%"
  height="350"
  style="border:0"
  loading="lazy"
  allowfullscreen
  [src]="mapUrl">
</iframe>
</div>
